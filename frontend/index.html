<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uranium Systems</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
</head>
<body>
  <div id="particles-js"></div>
  <main class="app-shell">
    <section class="container">
      <header class="hero">
        <h1 id="interactive-title" class="modern-title">
          Uranium Systems
        </h1>
      </header>

        <form id="automation-form" >
        <div class="form-columns">
          <div class="col panel">
              <div class="form-group">
                <label for="chipId">ID do Chip</label>
                <input type="text" id="chipId" placeholder="Ex.: chip-01" required>
              </div>

              <div class="form-group">
                <label for="phoneNumber">Cadastrar número na lista</label>
                <div class="row-input">
                  <input type="text" id="phoneNumber" placeholder="Ex.: 5511999999999">
                  <button type="button" id="add-number" class="btn-secondary">Adicionar</button>
                </div>
                <small>Cadastre no mínimo 2 números para envio de mensagens entre si.</small>
                <ul id="numbers-list"></ul>
              </div>
            </div>

            <div class="col panel">
              <div class="form-group">
                <label for="message">Mensagem</label>
                <textarea id="message" rows="4" placeholder="Olá {destinatario}, tudo bem?" required></textarea>
                <small>Use <code>{destinatario}</code> para inserir o destino automaticamente.</small>
              </div>

              <button type="submit" class="btn-primary">Abrir instâncias</button>
            </div>

        </div>

      </form>
      
      <!--<div id="status" class="panel status"></div>-->
    </section>
  </main>
  <script src="renderer.js"></script>
</body>
</html>
